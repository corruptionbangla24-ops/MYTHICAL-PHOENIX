<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYTHICAL PHOENIX - ROYAL FIRE BIRD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎰 ক্যাসিনো হেডার প্যানেল (ব্যালেন্স বক্স সহ ১ শতভাগ ডাইস-৩ডি স্ট্যান্ডার্ডে নিখুঁত লক ভাই ভাই) -->
    <div class="header">
        <div class="brand">
            <div class="name">MYTHICAL PHOENIX</div>
            <div class="game">ROYAL 5-REEL FIRE BIRD</div>
        </div>
        <div class="header-right">
            <button class="sound-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
            <div class="balance-box">৳ <span id="user-balance">0.00</span></div>
        </div>
    </div>

    <!-- 🎰 ওরিজিনাল ৫-রিল ফিনিক্স স্লট মেশিন উইন্ডো জোন ভাই ভাই -->
    <div class="phoenix-slot-zone">
        <div class="slot-window-frame">
            <!-- মেগা রেড ফায়ার কম্বো উইন লাইন লক ভাই ভাই -->
            <div class="laser-payline"></div>
            
            <div class="reels-wrapper">
                <!-- রিল ১ -->
                <div class="reel-box">
                    <div class="reel-strip" id="strip-0">
                        <div class="phoenix-tile">🦅</div>
                    </div>
                </div>
                <!-- রিল ২ -->
                <div class="reel-box">
                    <div class="reel-strip" id="strip-1">
                        <div class="phoenix-tile">🦅</div>
                    </div>
                </div>
                <!-- রিল ৩ -->
                <div class="reel-box">
                    <div class="reel-strip" id="strip-2">
                        <div class="phoenix-tile">🦅</div>
                    </div>
                </div>
                <!-- রিল ৪ -->
                <div class="reel-box">
                    <div class="reel-strip" id="strip-3">
                        <div class="phoenix-tile">🦅</div>
                    </div>
                </div>
                <!-- রিল ৫ -->
                <div class="reel-box">
                    <div class="reel-strip" id="strip-4">
                        <div class="phoenix-tile">🦅</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 🏆 ইন-লাইন লাইভ স্কোরিং ও উইন-লস মেসেজ বার -->
    <div class="win-status-container" id="win-status-box">
        <span id="win-text-msg">বেট সিলেক্ট করে SPIN বোতাম চাপুন ভাই, ফিনিক্স ফায়ার অন ফায়ার!</span>
    </div>

    <!-- 🎛️ কন্ট্রোল প্যানেল এরিয়া (৳১-৳২০০০0 প্লাস-মাইনাস ও SPIN বোতাম পাশাপাশি লক ভাই) -->
    <div class="footer-controls">
        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="adjustBet('minus')">−</button>
                <div style="text-align: center; width: 60px;">
                    <div style="font-size: 9px; color: #aaa; font-weight: bold;">BET</div>
                    <div style="font-size: 15px; font-weight: 900; color: #fff;" id="bet-display">৳৫০</div>
                </div>
                <button class="bet-btn-nav" onclick="adjustBet('plus')">+</button>
            </div>

            <button class="play-btn" id="spin-btn" onclick="handlePhoenixSpinAction()">SPIN</button>

            <div class="icon-group">
                <button class="icon-btn" id="auto-btn" onclick="toggleAuto()">🔄</button>
            </div>
        </div>
    </div>

    <!-- 🔌 [উইনগো কালার ট্রেড সিঙ্ক - ইউনিভার্সাল সকেট ইঞ্জিন লাইব্রেরি ভাই] -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('userId') || urlParams.get('id') || urlParams.get('username') || "guest_user";
        const urlWallet = urlParams.get('wallet') || "main";
        
        const SERVER_URL = window.location.origin;

        let balance = 0.00;
        let currentBet = 50; 
        let isSpinning = false; 
        let isAuto = false;
        let isMuted = false;
        let autoInterval = null;

        // ৫-রিলস ওরিজিনাল ফিনিক্স ইমোজি ডাইনামিক ম্যাপিং চাবি ভাই ভাই
        const phoenixDisplayMap = {
            "FIRE_PHOENIX": "🦅", "GOLDEN_FEATHER": "🪶", "RED_RUBY": "💎", 
            "FORTUNE_LANTERN": "🏮", "FIRE_RING": "⭕", "ANCIENT_COIN": "🪙", "SACRED_TREE": "🌳"
        };

        // 🧠 [১ শতভাগ একুরেট ৫-রিলস ক্যাসিনো স্পিনিং অ্যানিমেশন ইঞ্জিন ভাই ভাই]
        function animatePhoenixReels(serverReelsData, finalStatus, winAmount) {
            let completedReelsCount = 0;

            for (let i = 0; i < 5; i++) {
                const strip = document.getElementById(`strip-${i}`);
                const finalSymbol = serverReelsData[i];
                
                // রিল হাই-স্পিড স্পিনিং ব্লার মোশন ক্লাস পুশ ভাই ভাই
                strip.className = "reel-strip reel-blur-spinning-fast";
                
                let rollCounter = 0;
                const rollTimerInterval = setInterval(() => {
                    const tempPool = Object.keys(phoenixDisplayMap);
                    const randomSymbol = tempPool[Math.floor(Math.random() * tempPool.length)];
                    
                    strip.innerHTML = `<div class="phoenix-tile">${phoenixDisplayMap[randomSymbol]}</div>`;
                    rollCounter++;

                    // প্রতি রিলের জন্য কাস্টম সিকোয়েন্সিয়াল স্টপ টাইমার বাফার লক ভাই ভাই
                    if (rollCounter >= (12 + i * 4)) {
                        clearInterval(rollTimerInterval);
                        strip.className = "reel-strip final-symbol-pop-node";
                        
                        // যদি পিএনজি ছবি গিটহাবে থাকে তবে রেন্ডার করবে নতুবা ইমোজি ফলব্যাক লক!
                        const imgPath = `./images/${finalSymbol.toLowerCase()}.png`;
                        strip.innerHTML = `<img src="${imgPath}" class="tile-img-asset" onerror="this.onerror=null; this.parentNode.innerHTML='<div class=\"phoenix-tile\">${phoenixDisplayMap[finalSymbol] || "🦅"}</div>';">`;
                        
                        completedReelsCount++;
                        playAudio('click');

                        // যখন ৫ নম্বর লাস্ট রিল থেমে যাবে
                        if (completedReelsCount === 5) {
                            showFinalGameReward(finalStatus, winAmount);
                        }
                    }
                }, 65);
            }
        }

        // 🛫 কোর SPIN বোতাম ট্রিগার অ্যাকশন গেটওয়ে ভাই ভাই
        async function handlePhoenixSpinAction() {
            if (isSpinning) return;

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("win-status-box").className = "win-status-container";
            document.getElementById("win-text-msg").innerText = "🎰 অমর ফিনিক্সের রিলস ফায়ার ট্র্যাকে স্পিন হচ্ছে...";

            playAudio('spin');

            try {
                const response = await fetch(`${SERVER_URL}/api/phoenix-spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: urlUserId,
                        amount: parseFloat(currentBet),
                        wallet: urlWallet
                    })
                });

                const data = await response.json();

                if (data && data.success === true) {
                    balance = parseFloat(data.balance);
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    if (window.top) window.top.postMessage({ action: "refresh_wallet" }, "*");

                    // সার্ভার ডাটা আসার পর লাইভ এনিমেশন লুপ ফায়ার লক ভাই ভাই
                    animatePhoenixReels(data.reels, data.status, data.winAmount);
                } else {
                    alert(data.message || "❌ Insufficient Balance! Please Recharge BDT.");
                    stopSpinState();
                }
            } catch (err) {
                alert("⚠️ সেশন আউট! আবার SPIN বোতাম চাপুন ভাই ভাই।");
                stopSpinState();
            }
        }

        function showFinalGameReward(status, winAmount) {
            const msgBox = document.getElementById("win-status-box");
            const textMsg = document.getElementById("win-text-msg");

            if (status === "win") {
                playAudio('win');
                msgBox.className = "win-status-container win-glow-bar";
                textMsg.innerText = `🏆 মেগা ফায়ার ফিনিক্স কম্বো উইন!! আপনি জিতেছেন: ৳${winAmount}`;
            } else {
                playAudio('wheel'); 
                msgBox.className = "win-status-container lose-glow-bar";
                textMsg.innerText = `❌ ওহ হো! এই রাউন্ডে অমর ফিনিক্সের কম্বো ম্যাচ লাইন মেলেনি ভাই ভাই!`;
            }

            document.getElementById("user-balance").innerText = balance.toFixed(2);
            stopSpinState();

            if (isAuto) {
                autoInterval = setTimeout(() => {
                    if (isAuto) handlePhoenixSpinAction();
                }, 2600); 
            }
        }

        if (typeof io !== 'undefined') {
            const socket = io();
            socket.on("balanceUpdate", (data) => {
                if (data && data.username === urlUserId) {
                    if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
                    fetchLiveBalance();
                }
            });
        }

               async function fetchLiveBalance() {
            try {
                const response = await fetch(`${SERVER_URL}/api/phoenix-balance?userId=${urlUserId}&wallet=${urlWallet}`);
                const data = await response.json();
                if (data && data.success) {
                    balance = parseFloat(data.balance);
                    document.getElementById("user-balance").innerText = balance.toFixed(2);
                }
            } catch (e) { console.error("Balance query pass"); }
        }

        window.onload = () => {
            if (window.parent) window.parent.postMessage({ action: "refresh_wallet" }, "*");
            fetchLiveBalance();
        };

        function adjustBet(action) {
            if (isSpinning) return;
            if (action === 'minus' && currentBet > 1) {
                if (currentBet <= 10) currentBet -= 1;
                else if (currentBet <= 100) currentBet -= 10;
                else if (currentBet <= 1000) currentBet -= 100;
                else currentBet -= 500;
            }
            if (action === 'plus' && currentBet < 20000) {
                if (currentBet < 10) currentBet += 1;
                else if (currentBet < 100) currentBet += 10;
                else if (currentBet < 1000) currentBet += 100;
                else currentBet += 500;
            }
            if (currentBet < 1) currentBet = 1;
            if (currentBet > 20000) currentBet = 20000;
            
            document.getElementById("bet-display").innerText = `৳${currentBet}`;
            playAudio('click');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById("mute-btn").innerText = isMuted ? "🔇" : "🔊";
            document.getElementById("mute-btn").classList.toggle("muted-active", isMuted);
            slotSounds.click.muted = isMuted;
            slotSounds.spin.muted = isMuted;
            slotSounds.win.muted = isMuted;
            slotSounds.wheel.muted = isMuted;
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById("auto-btn").classList.toggle("active", isAuto);
            if (isAuto && !isSpinning) handlePhoenixSpinAction();
            playAudio('click');
        }

        function stopSpinState() {
            isSpinning = false;
            document.getElementById("spin-btn").disabled = false;
            if (!isAuto && autoInterval) clearTimeout(autoInterval);
        }

        // 🎯 [৪টি ওরিজিনাল প্রফেশনাল স্লট সাউন্ড ও বাফার গেটওয়ে লক ভাই ভাই]
        const slotSounds = {
            click: new Audio('click2.mp3'),
            spin: new Audio('spin2.mp3'),
            win: new Audio('win2.mp3'),
            wheel: new Audio('wheel1.mp3')
        };
        Object.values(slotSounds).forEach(s => s.load());

        function playAudio(type) { 
            if (isMuted) return; 
            try { 
                slotSounds[type].currentTime = 0; 
                slotSounds[type].play(); 
            } catch(e){} 
        }
    </script>
</body>
</html>
